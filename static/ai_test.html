<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能巡检系统 - AI测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-area {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            margin-top: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #333;
            overflow-y: auto;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .metric-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .chat-message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
        }
        
        .chat-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .chat-message.ai {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input-container textarea {
            flex: 1;
            min-height: 50px;
            resize: none;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .nav-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .nav-tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 智能巡检系统 AI测试</h1>
            <p>测试智能体功能、自然语言交互和AI分析能力</p>
        </div>

        <div class="card">
            <h2>导航菜单</h2>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showTab('chat')">💬 自然语言交互</button>
                <button class="nav-tab" onclick="showTab('metrics')">📊 业务指标</button>
                <button class="nav-tab" onclick="showTab('analysis')">🔍 AI分析</button>
                <button class="nav-tab" onclick="showTab('system')">🖥️ 系统状态</button>
            </div>

            <!-- 自然语言交互 -->
            <div id="chat" class="tab-content active">
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-message ai">
                            您好！我是智能巡检系统的AI助手。请问有什么可以帮助您的？
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <textarea id="chat-input" placeholder="输入您的问题，例如：有多少台设备？"></textarea>
                        <button class="btn" onclick="sendChat()">发送</button>
                    </div>
                </div>
            </div>

            <!-- 业务指标 -->
            <div id="metrics" class="tab-content">
                <button class="btn" onclick="getBusinessMetrics()">获取业务指标</button>
                <div id="business-result" class="result-area">点击按钮获取业务指标...</div>
            </div>

            <!-- AI分析 -->
            <div id="analysis" class="tab-content">
                <div class="form-group">
                    <label>自定义分析问题（可选）</label>
                    <textarea id="analysis-query" placeholder="例如：系统运行状态如何？有什么优化建议？"></textarea>
                </div>
                <button class="btn" onclick="generateInsights()">生成AI分析洞察</button>
                <div id="analysis-result" class="result-area">点击按钮生成AI分析...</div>
            </div>

            <!-- 系统状态 -->
            <div id="system" class="tab-content">
                <button class="btn" onclick="getSystemStatus()">获取系统状态</button>
                <div id="system-result" class="result-area">点击按钮获取系统状态...</div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000';
        
        // 显示标签页
        function showTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 发送聊天消息
        async function sendChat() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const query = input.value.trim();
            
            if (!query) return;
            
            // 添加用户消息
            messages.innerHTML += `<div class="chat-message user">${query}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
            
            // 添加加载提示
            messages.innerHTML += `<div class="chat-message ai" id="loading-message">正在分析...</div>`;
            messages.scrollTop = messages.scrollHeight;
            
            try {
                const response = await fetch(`${BASE_URL}/api/agent/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                
                // 移除加载提示
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                
                // 添加AI回复
                messages.innerHTML += `<div class="chat-message ai">${data.data.naturalResponse}</div>`;
            } catch (error) {
                // 移除加载提示
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                messages.innerHTML += `<div class="chat-message ai">❌ 连接失败：${error.message}</div>`;
            }
            
            messages.scrollTop = messages.scrollHeight;
        }

        // 获取业务指标
        async function getBusinessMetrics() {
            const result = document.getElementById('business-result');
            result.innerHTML = '正在获取...';
            
            try {
                const response = await fetch(`${BASE_URL}/api/agent/business/metrics`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                result.innerHTML = JSON.stringify(data.data, null, 2);
            } catch (error) {
                result.innerHTML = '❌ 获取失败：' + error.message;
            }
        }

        // 生成AI分析洞察
        async function generateInsights() {
            const result = document.getElementById('analysis-result');
            const query = document.getElementById('analysis-query').value;
            result.innerHTML = '正在分析...';
            
            try {
                const response = await fetch(`${BASE_URL}/api/agent/ai/insights`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                result.innerHTML = data.data.aiInsights;
            } catch (error) {
                result.innerHTML = '❌ 分析失败：' + error.message;
            }
        }

        // 获取系统状态
        async function getSystemStatus() {
            const result = document.getElementById('system-result');
            result.innerHTML = '正在获取...';
            
            try {
                const response = await fetch(`${BASE_URL}/api/agent/status`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                result.innerHTML = JSON.stringify(data.data, null, 2);
            } catch (error) {
                result.innerHTML = '❌ 获取失败：' + error.message;
            }
        }

        // 获取Token（从localStorage或模拟）
        function getToken() {
            return localStorage.getItem('auth_token') || 'test-token';
        }

        // 自动登录（演示用）
        async function autoLogin() {
            try {
                const response = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: '12305' })
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        console.log('登录成功:', data);
                    }
                } else {
                    console.log('登录失败:', response.status);
                }
            } catch (error) {
                console.log('自动登录失败:', error);
            }
        }

        // 页面加载时自动登录
        autoLogin();

        // 回车键发送消息
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });
    </script>
</body>
</html>
